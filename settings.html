<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstellungen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Einstellungen</h1>
        <form method="POST" action="{{ url_for('main.settings') }}" class="mb-3 d-flex">
            <input type="hidden" name="action" value="add">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" class="form-control me-2" name="subject" placeholder="Neues Fach" required>
            <button type="submit" class="btn btn-primary">Hinzufügen</button>
        </form>
        <h2 class="mt-5">Aktuelle Fächer</h2>
        <ul class="list-group">
            {% for subject in subjects %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ subject }}</span>
                <form method="POST" action="{{ url_for('main.settings') }}" class="m-0">
                    <input type="hidden" name="action" value="remove">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="subject" value="{{ subject }}">
                    <button type="submit" class="btn btn-sm btn-danger">Entfernen</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
