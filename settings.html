<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstellungen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Einstellungen</h1>
        <form method="POST" action="{{ url_for('settings') }}">
            <div class="mb-3">
                <label for="new_subject" class="form-label">Neues Fach hinzufügen</label>
                <input type="text" class="form-control" id="new_subject" name="new_subject" placeholder="Neues Fach">
            </div>
            <button type="submit" class="btn btn-primary">Hinzufügen</button>
        </form>
        <h2 class="mt-5">Aktuelle Fächer</h2>
        <ul class="list-group">
            {% for subject in subjects %}
            <li class="list-group-item">{{ subject }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
