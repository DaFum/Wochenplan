# Compliment: Excellent YAML structure foundation - clean and maintainable!

services:
  - type: web
    name: wochenplan-app
    env: python
    python: 3.11
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromService:
          type: pgsql
          name: wochenplan-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
    healthCheckPath: /health

  - type: pgsql
    name: wochenplan-db
    databaseName: wochenplan
    user: wochenplan_user
