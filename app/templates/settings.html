<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstellungen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1>Einstellungen</h1>
        <div class="card mt-3">
            <div class="card-header">
                <h5 class="mb-0">Fächer</h5>
            </div>
            <div class="card-body">
                <form method="POST" class="mb-3 d-flex">
                    <input type="hidden" name="action" value="add">
                    <input type="text" name="subject" class="form-control me-2" placeholder="Neues Fach" required>
                    <button type="submit" class="btn btn-primary" title="Fügt ein neues Fach hinzu und lädt die Seite neu">Hinzufügen</button>
                </form>
                <ul class="list-group">
                    {% for subject in subjects %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>{{ subject }}</span>
                        <form method="POST" class="m-0">
                            <input type="hidden" name="action" value="remove">
                            <input type="hidden" name="subject" value="{{ subject }}">
                            <button type="submit" class="btn btn-sm btn-danger">Entfernen</button>
                        </form>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
        <a href="{{ url_for('main.home') }}" class="btn btn-primary mt-3">Zurück</a>
    </div>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
