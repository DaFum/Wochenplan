<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wochenplan</title>
    <style>
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #444;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Wochenplan</h1>
    <table>
        <thead>
            <tr>
                <th>Tag</th>
                <th>Fach 1</th>
                <th>Material 1</th>
                <th>Fach 2</th>
                <th>Material 2</th>
                <th>Lernaufgabe</th>
            </tr>
        </thead>
        <tbody>
            {% for entry in entries %}
            <tr>
                <td>{{ entry.day }}</td>
                <td>{{ entry.subject1.name }}</td>
                <td>{{ entry.material1 }}</td>
                <td>{{ entry.subject2.name }}</td>
                <td>{{ entry.material2 }}</td>
                <td>{{ entry.learning_task }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
