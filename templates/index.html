<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochenplan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.6.0/gsap.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .tab-content {
            margin-top: 20px;
        }
        .card-header {
            cursor: pointer;
        }
        .gradient-header {
            background: linear-gradient(90deg, rgba(255,153,102,1) 0%, rgba(255,94,98,1) 50%, rgba(255,0,132,1) 100%);
        }
        body.dark-mode {
            background-color: #343a40;
            color: #f8f9fa;
        }
        .dark-mode .card {
            background-color: #495057;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center gradient-header p-3 rounded">
            <h1 class="text-white">Wochenplan</h1>
            <a href="{{ url_for('settings') }}" class="btn btn-light">Einstellungen</a>
        </div>
        <button id="darkModeToggle" class="btn btn-secondary">Dunkelmodus umschalten</button>
        <input type="text" id="searchInput" class="form-control mt-3" placeholder="Suche nach Fach oder Material">
        <ul class="nav nav-tabs" id="weekdaysTabs" role="tablist">
            {% for day in days %}
            <li class="nav-item" role="presentation">
                <a class="nav-link {{ 'active' if loop.first else '' }}" id="{{ day }}-tab" data-bs-toggle="tab" href="#{{ day }}" role="tab" aria-controls="{{ day }}" aria-selected="{{ 'true' if loop.first else 'false' }}">{{ day }}</a>
            </li>
            {% endfor %}
        </ul>
        <div class="tab-content" id="weekdaysContent">
            {% for day, data in days.items() %}
            <div class="tab-pane fade {{ 'show active' if loop.first else '' }}" id="{{ day }}" role="tabpanel" aria-labelledby="{{ day }}-tab">
                <div class="card mt-3">
                    <div class="card-header" data-bs-toggle="collapse" data-bs-target="#collapse{{ day }}" aria-expanded="true" aria-controls="collapse{{ day }}">
                        <h5 class="mb-0">{{ day }}</h5>
                    </div>
                    <div id="collapse{{ day }}" class="collapse show">
                        <div class="card-body search-item">
                            <form method="POST" action="{{ url_for('home') }}">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <div class="mb-3">
                                    <label for="subject1-{{ day }}" class="form-label">Fach 1</label>
                                    <input type="text" class="form-control" id="subject1-{{ day }}" name="subject1-{{ day }}" value="{{ data.subject1 }}">
                                </div>
                                <div class="mb-3">
                                    <label for="material1-{{ day }}" class="form-label">Material 1</label>
                                    <input type="text" class="form-control" id="material1-{{ day }}" name="material1-{{ day }}" value="{{ data.material1 }}">
                                </div>
                                <div class="mb-3">
                                    <label for="subject2-{{ day }}" class="form-label">Fach 2</label>
                                    <input type="text" class="form-control" id="subject2-{{ day }}" name="subject2-{{ day }}" value="{{ data.subject2 }}">
                                </div>
                                <div class="mb-3">
                                    <label for="material2-{{ day }}" class="form-label">Material 2</label>
                                    <input type="text" class="form-control" id="material2-{{ day }}" name="material2-{{ day }}" value="{{ data.material2 }}">
                                </div>
                                <div class="mb-3">
                                    <label for="learning-subject-{{ day }}" class="form-label">Lernfach</label>
                                    <input type="text" class="form-control" id="learning-subject-{{ day }}" name="learning-subject-{{ day }}" value="{{ data.learning_subject }}">
                                </div>
                                <div class="mb-3">
                                    <label for="learning-task-{{ day }}" class="form-label">Lernaufgabe</label>
                                    <input type="text" class="form-control" id="learning-task-{{ day }}" name="learning-task-{{ day }}" value="{{ data.learning_task }}">
                                </div>
                                <button type="submit" class="btn btn-primary">Speichern</button>
                            </form>
                            <div class="mt-3">
                                <p><strong>Aufgabe:</strong> {{ data.task }}</p>
                                <p><strong>Tipp:</strong> {{ data.tip }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // GSAP animations for tab transitions
            const tabs = document.querySelectorAll('.nav-link');
            tabs.forEach(tab => {
                tab.addEventListener('show.bs.tab', function(event) {
                    gsap.fromTo(event.target, { opacity: 0 }, { opacity: 1, duration: 0.5 });
                });
            });

            // Swipe gestures for mobile devices
            let touchstartX = 0;
            let touchendX = 0;
            const tabsElement = document.getElementById('weekdaysTabs');

            function handleGesture() {
                if (touchendX < touchstartX) {
                    const nextTab = document.querySelector('.nav-link.active').parentElement.nextElementSibling;
                    if (nextTab) nextTab.querySelector('.nav-link').click();
                }
                if (touchendX > touchstartX) {
                    const prevTab = document.querySelector('.nav-link.active').parentElement.previousElementSibling;
                    if (prevTab) prevTab.querySelector('.nav-link').click();
                }
            }

            tabsElement.addEventListener('touchstart', e => {
                touchstartX = e.changedTouches[0].screenX;
            });

            tabsElement.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                handleGesture();
            });

            // Dunkelmodus umschalten
            document.getElementById('darkModeToggle').addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
            });

            // Formular-Bestätigungsmeldung
            document.querySelectorAll('form').forEach(function(form) {
                form.addEventListener('submit', function(event) {
                    alert('Änderungen erfolgreich gespeichert.');
                });
            });

            // Suchfunktion für Fächer und Materialien
            document.getElementById('searchInput').addEventListener('keyup', function() {
                let filter = this.value.toLowerCase();
                document.querySelectorAll('.search-item').forEach(function(item) {
                    let text = item.textContent.toLowerCase();
                    item.style.display = text.includes(filter) ? '' : 'none';
                });
            });
        });
    </script>
</body>
</html>
