<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochenplaner für Cleverboys</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.0/ScrollTrigger.min.js"></script>
</head>
<body>
    <header class="dynamic-header" role="banner">
        <nav class="navbar">
            <ul class="nav-list">
                {% for day in weekdays %}
                <li><a href="#{{ day }}" class="tab-link">{{ day }}</a></li>
                {% endfor %}
            </ul>
        </nav>
    </header>

    <main>
        <button class="dark-mode-toggle" onclick="toggleDarkMode()">Dark Mode</button>
        <h1 class="title">MEGA-SCHUL-WOCHENPLANER für CLEVERBOYS!</h1>

        <div class="tab-content">
            {% for day in weekdays %}
            <div class="tab-pane" id="{{ day }}">
                <h2>{{ day }}</h2>
                <div class="collapsible-card">
                    <form method="POST">
                        <label for="subject1-{{ day }}">Fach 1:</label>
                        <select id="subject1-{{ day }}" name="subject1-{{ day }}" required>
                            <option value="">Bitte wählen</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.name }}">{{ subject.name }}</option>
                            {% endfor %}
                        </select>
                        <input type="text" name="material1-{{ day }}" placeholder="Benötigtes Material">

                        <label for="subject2-{{ day }}">Fach 2:</label>
                        <select id="subject2-{{ day }}" name="subject2-{{ day }}" required>
                            <option value="">Bitte wählen</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.name }}">{{ subject.name }}</option>
                            {% endfor %}
                        </select>
                        <input type="text" name="material2-{{ day }}" placeholder="Benötigtes Material">

                        <label for="learning-subject-{{ day }}">Lernfach:</label>
                        <select id="learning-subject-{{ day }}" name="learning-subject-{{ day }}" required>
                            <option value="">Bitte wählen</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.name }}">{{ subject.name }}</option>
                            {% endfor %}
                        </select>
                        <input type="text" name="learning-task-{{ day }}" placeholder="Aufgabe">

                        <button type="submit">Speichern</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
        // Tab Navigation Logic
        document.querySelectorAll('.tab-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.tab-pane').forEach(pane => pane.style.display = 'none');
                document.querySelector(link.getAttribute('href')).style.display = 'block';
            });
        });

        // Set default tab to display
        document.querySelector('.tab-pane').style.display = 'block';

        // GSAP Animations
        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".title", { duration: 1.2, y: -30, opacity: 0, ease: "power3.out" });
            gsap.from(".collapsible-card", { duration: 0.8, opacity: 0, stagger: 0.2, ease: "power2.out" });
        });

        // Dark mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode'));
        }

        // Load dark mode preference
        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // Swipe gestures for mobile
        let startX;
        document.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
        document.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) {
                // Swipe left logic: Switch to the next tab
                const currentTab = document.querySelector('.tab-pane:not([style*="display: none"])');
                let nextTab = currentTab.nextElementSibling || document.querySelector('.tab-pane');
                document.querySelectorAll('.tab-pane').forEach(pane => pane.style.display = 'none');
                nextTab.style.display = 'block';
            } else if (endX - startX > 50) {
                // Swipe right logic: Switch to the previous tab
                const currentTab = document.querySelector('.tab-pane:not([style*="display: none"])');
                let prevTab = currentTab.previousElementSibling || document.querySelector('.tab-pane:last-child');
                document.querySelectorAll('.tab-pane').forEach(pane => pane.style.display = 'none');
                prevTab.style.display = 'block';
            }
        });
    </script>
</body>
</html>
